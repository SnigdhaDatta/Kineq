services:
  kineq-api:
    image: ${DOCKERHUB_USERNAME}/kineq-api:${GITHUB_SHA}
    env_file:
      - ./.env
    
    restart: unless-stopped
    ports:
      - "8000:8000"
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

    depends_on:
      - kineq-api