services:
  kineq-api:
    image: ${DOCKERHUB_USERNAME}/kineq-api:${GITHUB_SHA}
    env_file:
      - ./.env
    
    restart: unless-stopped
    ports:
      - "8000:8000"
  nginx:
    image: nginx:alpine 
    restart: unless-stopped
    ports:
      - "80:80" # Expose port 80 for HTTP
      - "443:443" # Expose port 443 for HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Mount the nginx.conf file into the container
      - /etc/letsencrypt:/etc/letsencrypt:ro # Mount the Let's Encrypt directory for SSL certificates

    depends_on:
      - kineq-api