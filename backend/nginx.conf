events {};
http {
    server {
        # Redirect all HTTP traffic to HTTPS
        listen 80;
        server_name kineq-api.snowpie.me;
        return 301 https://$host$request_uri;
    }

    server {
        # Serve the API over HTTPS
        listen 443 ssl;
        server_name kineq-api.snowpie.me;

        # Certbot will automatically set these paths
        ssl_certificate /etc/letsencrypt/live/kineq-api.snowpie.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kineq-api.snowpie.me/privkey.pem;

        location / {
            proxy_pass http://kineq-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}